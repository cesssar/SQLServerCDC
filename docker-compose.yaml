version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver-dev
    environment:
      ACCEPT_EULA: Y
      MSSQL_SA_PASSWORD: "YourSecurePassword123!"
      MSSQL_AGENT_ENABLED: "true"
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - sqlserver-net
    mem_limit: 4gb
    restart: unless-stopped

  redis:
    image: redis:8.4
    container_name: redis
    hostname: dkr_redis
    restart: always
    ports:
      - "6379:6379"
    command: >
      redis-server 
      --requirepass asdfWRAETVAasdfRRFVsdfg
      --save 60 1 
      --save 300 10
      --appendonly yes 
      --appendfsync always
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --databases 16
    volumes:
      - redis_data:/data
    networks:
      - sqlserver-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "asdfWRAETVAasdfRRFVsdfg", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    environment:
      - REDIS_PASSWORD=asdfWRAETVAasdfRRFVsdfg

  dbgate:
    image: dbgate/dbgate
    container_name: dbgate
    ports:
      - "3000:3000"
    environment:
      LOGIN: admin
      PASSWORD: SuperSenha123
    volumes:
      - dbgate_data:/root/.dbgate
    networks:
      - sqlserver-net
    depends_on:
      - sqlserver
    restart: unless-stopped

volumes:
  sqlserver-data:
  redis_data:
  redisinsight_data:
  dbgate_data:

networks:
  sqlserver-net:
    driver: bridge